services:
  # 1. Source Database (SQL Server 2022)
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
    ports:
      - "1433:1433"
    volumes:
      - ./init_sqlserver.sql:/docker-entrypoint-initdb.d/init.sql
    command: |
      bash -c '
      /opt/mssql/bin/sqlservr &
      echo "Waiting for SQL Server to be ready..."
      for i in {1..50}; do
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Password123!" -C -Q "SELECT 1" > /dev/null 2>&1
        if [ $$? -eq 0 ]; then
          echo "SQL Server is ready, running init script..."
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Password123!" -C -i /docker-entrypoint-initdb.d/init.sql
          break
        fi
        echo "Still waiting for SQL Server... ($$i)"
        sleep 5
      done
      wait'

  # 2. Staging Database (PostgreSQL)
  postgres_staging:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: staging_db
    ports:
      - "5433:5432"

  # 3. Restate Server
  restate:
    image: docker.io/restatedev/restate:latest
    ports:
      - "8083:8080"
      - "9070:9070"
    environment:
      - RESTATE_ADMIN__BIND_ADDRESS=0.0.0.0:9070
      - RESTATE_INGRESS__HTTP_SERVER__BIND_ADDRESS=0.0.0.0:8080
    
  # 4. Mock SAP API endpoint
  mock_sap:
    image: python:3.11-slim-bookworm
    working_dir: /app
    volumes:
      - ./mock_sap_api.py:/app/main.py
    command: bash -c "pip install fastapi uvicorn && uvicorn main:app --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
      
  # 5. Restate Handlers Server (Data Plane)
  restate-handlers:
    build:
      context: ../../
      dockerfile: examples/sql_to_sap/Dockerfile.worker
    environment:
      API_BASE_URL: "http://mock_sap:5000"
      SQLSERVER_DSN: "DRIVER={ODBC Driver 18 for SQL Server};SERVER=sqlserver,1433;DATABASE=INTERNAL_ERP;UID=sa;PWD=Password123!;Encrypt=no;"
    depends_on:
      - sqlserver
      - mock_sap
      - restate
